# ─────────────────────────────────────────────────────────────────────────────
# KEDA ScaledObjects — Kafka lag-based horizontal autoscaling
#
# Scales kraken-cis pods up when Kafka consumer lag exceeds lagThreshold,
# and back to minReplicaCount when lag returns to zero.
#
# Prerequisite: KEDA operator installed in the cluster
#   kubectl apply -f https://github.com/kedacore/keda/releases/download/v2.13.0/keda-2.13.0.yaml
#
# Rule: ensure Kafka partitions >= maxReplicaCount to make scaling useful.
# ─────────────────────────────────────────────────────────────────────────────

# ── RCDC command flow scaler ──────────────────────────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kraken-cis-rcdc-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: kraken-cis-implementation
  minReplicaCount: 2      # always keep at least 2 replicas for HA
  maxReplicaCount: 10     # cap — match to Kafka partition count
  cooldownPeriod: 120     # seconds to wait before scaling back down
  pollingInterval: 15     # seconds between lag checks
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: "192.168.4.34:9092"
        consumerGroup: kraken-cis-group
        topic: kraken-rcdc-events
        lagThreshold: "100"          # add a pod per 100 unprocessed messages
        offsetResetPolicy: earliest

---
# ── RCDC HES response flow scaler ─────────────────────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kraken-cis-rcdc-hes-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: kraken-cis-implementation
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 120
  pollingInterval: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: "192.168.4.34:9092"
        consumerGroup: kraken-cis-group-mdm
        topic: kraken-rcdc-hes-response-events
        lagThreshold: "100"
        offsetResetPolicy: earliest

---
# ── Alarm events flow scaler ───────────────────────────────────────────────────
# Alarm events can arrive in large bursts — lower lagThreshold to react faster.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kraken-cis-alarms-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: kraken-cis-implementation
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 60      # alarm bursts subside quickly — scale down faster
  pollingInterval: 10
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: "192.168.4.34:9092"
        consumerGroup: kraken-cis-group
        topic: kraken-alarm-events
        lagThreshold: "200"          # alarms are fire-and-forget; tolerate more lag
        offsetResetPolicy: earliest
