kong.yaml: |
_format_version: "3.0"

services:
  - name: rcdc-request-main-service
	protocol: http
	host: pge-camel-eip.default.svc.cluster.local
	port: 80
	path: /api/v1/rcdc
	routes:
	  - name: rcdc-route
		paths:
		  - /rcdc
		methods:
		  - POST
		strip_path: true
		preserve_host: false
		protocols:
		  - http
		  - https
	plugins:
	  - name: request-transformer
		config:
		  remove:
			headers:
			  - Authorization
		  add:
			headers:
			  - "Content-Type: application/xml"
			  - "Accept: application/xml"

  - name: rcdc-mock-request-service
	protocol: http
	host: pge-mock-services.default.svc.cluster.local
	port: 80
	path: /api/v1/rcdcrequest
	routes:
	  - name: rcdcrequest-route
		paths:
		  - /rcdcrequest
		methods:
		  - POST
		strip_path: true
		preserve_host: false
		protocols:
		  - http
		  - https
	plugins:
	  - name: request-transformer
		config:
		  remove:
			headers:
			  - Authorization
		  add:
			headers:
			  - "Content-Type: application/json"
			  - "Accept: application/json"

  - name: rcdc-response-service
	protocol: http
	host: pge-camel-eip.default.svc.cluster.local
	port: 80
	path: /api/v1/rcdc/response
	routes:
	  - name: rcdc-response-route
		paths:
		  - /rcdcresponse
		methods:
		  - POST
		strip_path: true
		preserve_host: false
		protocols:
		  - http
		  - https
	plugins:
	  - name: request-transformer
		config:
		  remove:
			headers:
			  - Authorization
		  add:
			headers:
			  - "Content-Type: application/json"
			  - "Accept: application/json"

  - name: rcdc-soap-service
	protocol: http
	host: 68.233.110.225
	port: 8000
	path: /soap/rcdc
	# resiliency for a remote SOAP backend
	connect_timeout: 30000
	write_timeout: 30000
	read_timeout: 30000
	retries: 3
	routes:
	  - name: rcdc-soap-route
		paths:
		  - /rcdcswitchstatus
		methods:
		  - POST          # SOAP operations
		  - GET           # ?wsdl contract retrieval
		# keep the matched path so /soap/rcdc and ?wsdl resolve upstream
		strip_path: false
		preserve_host: false
		protocols:
		  - http
		  - https
	plugins:
	  # Inject Basic Auth + enforce SOAP/XML content negotiation on the
	  # OUTBOUND call to the SOA-RCDC service.
	  - name: request-transformer
		config:
		  replace:
			headers:
			  # base64("SOAUSER:UserSOA@00") — REGENERATE after rotating creds
			  - "Authorization: Basic U09BVVNFUjpVc2VyU09BQDAw"
			  - "Content-Type: text/xml; charset=utf-8"
		  add:
			headers:
			  - "Accept: text/xml"
			  # SOAPAction is often required; empty string per the integration doc
			  - "SOAPAction: \"\""

  - name: alarms-service
	protocol: http
	host: pge-camel-eip.default.svc.cluster.local
	port: 80
	path: /api/v1/alarms
	routes:
	  - name: alarms-route
		paths:
		  - /alarms
		methods:
		  - POST
		strip_path: true
		preserve_host: false
		protocols:
		  - http
		  - https
	plugins:
	  - name: request-transformer
		config:
		  remove:
			headers:
			  - Authorization
		  add:
			headers:
			  - "Content-Type: application/json"
			  - "Accept: application/json"

  - name: ODR-service
	protocol: http
	host: pge-camel-eip.default.svc.cluster.local
	port: 80
	path: /api/v1/odr
	routes:
	  - name: odr-route
		paths:
		  - /ondemandread
		methods:
		  - POST
		strip_path: true
		preserve_host: false
		protocols:
		  - http
		  - https
	plugins:
	  - name: request-transformer
		config:
		  remove:
			headers:
			  - Authorization
		  add:
			headers:
			  - "Content-Type: application/xml"
			  - "Accept: application/xml"

  - name: ODR-service-mock
	protocol: http
	host: pge-mock-services.default.svc.cluster.local
	port: 80
	path: /api/v1/ws/OnDemandRead
	routes:
	  - name: mock-odr-route
		paths:
		  - /mockondemandread
		methods:
		  - POST
		strip_path: true
		preserve_host: false
		protocols:
		  - http
		  - https
	plugins:
	  - name: request-transformer
		config:
		  remove:
			headers:
			  - Authorization
		  add:
			headers:
			  - "Content-Type: application/xml"
			  - "Accept: application/xml"

plugins:
  - name: opentelemetry
	config:
	  endpoint: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
	  header_type: w3c
	  resource_attributes:
		service.name: kong-gateway

  - name: jwt
	config:
	  key_claim_name: iss
	  claims_to_verify:
		- exp

  - name: correlation-id
	config:
	  header_name: X-Correlation-ID
	  generator: uuid
	  echo_downstream: true

  - name: prometheus

  - name: rate-limiting
	config:
	  minute: 5000
	  policy: local

  - name: file-log
	config:
	  path: /tmp/kong-api.log

consumers:
  - username: external-consumer

jwt_secrets:
  - consumer: external-consumer
	key: jwt-issuer
	secret: Kraken@2026!ExternalConsumer#JWT_Kong$Secure92xLpZ
	algorithm: HS256
