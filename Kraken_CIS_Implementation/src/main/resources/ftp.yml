ftp:
  common:
    host: 192.168.4.34
    port: 21
    username: ProfileReads
    password: ProfileReads

  profile-reads:
    connection:
      host: 192.168.4.34
      port: 21
      username: ProfileReads
      password: ProfileReads
    remote-directory: /Reads/profilereads
    move-directory: /Reads/Archive
    error-directory: /Reads/Error
    include: ".*\\.csv"
    delay-ms: 60000
    binary: false
    charset: UTF-8
    passive-mode: true
    read-lock: changed
    read-lock-min-age-ms: 1000
    max-messages-per-poll: 50
    thread-pool-size: 4
    idempotent: true
    max-file-size-mb: 100     # reject files larger than this before parsing
    kafka-batch-size: 500     # publish every N parsed rows; bounds heap usage
