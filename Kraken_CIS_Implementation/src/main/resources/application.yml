spring:
  application:
    name: kraken-cis-implementation
  profiles:
    active: dev
  config:
    import: optional:classpath:kafka.yml,optional:classpath:ftp.yml,optional:classpath:s3.yml

# Spring Boot embedded server (Actuator management endpoints only)
server:
  port: 8121

# Retry-queue consumer — delay between retry-queue attempts (back-off)
retry:
  queue:
    max-attempts: 3          # re-entries into retry queue before final DLQ
    poll-delay-ms: 300000    # 5 min — slow poll IS the back-off delay

# Automatic DLQ replay (DlqReplayRoute) — OPT-IN, disabled by default.
# When enabled, transient-failure DLQ messages are periodically replayed back to
# their source topic (capped by max-replays); permanent errors and exhausted
# replays are moved to the *-parking topic for manual review. See DlqReplayRoute.
dlq:
  replay:
    enabled: true            # automatic replay ON
    interval-ms: 1800000     # 30 min between replay runs
    initial-delay-ms: 30000  # first run 30 s after startup (not a full interval later)
    max-messages-per-run: 100
    max-replays: 3           # transient replays before parking

# Kong JWT — Bearer token added to all outbound HTTP calls routed through Kong.
# Override kong.jwt.secret via environment variable KONG_JWT_SECRET in production.
kong:
  jwt:
    secret: Kraken@2026!ExternalConsumer#JWT_Kong$Secure92xLpZ
    issuer: jwt-issuer
    expiry: 2910000000

# Camel Undertow REST API (main application port)
rest:
  host: 0.0.0.0
  port: 8122

# External service endpoints — all outbound target URLs configured here.
# Override per environment in config/{env}/application-{env}.yml
external-services:
  services:
    rcdc:
      url: http://k8s-kong-kongprox-9acef1f816-46ee569626f12d48.elb.ap-south-2.amazonaws.com/rcdcrequest
      timeout: 30000
      content-type: application/json
    rcdc-mdm-notification:
      url: http://k8s-kong-kongprox-9acef1f816-46ee569626f12d48.elb.ap-south-2.amazonaws.com/rcdcswitchstatus
      timeout: 30000
      content-type: "text/xml; charset=utf-8"
    odr-mock:
      url: http://k8s-kong-kongprox-9acef1f816-46ee569626f12d48.elb.ap-south-2.amazonaws.com/mockondemandread
      timeout: 30000
      content-type: "text/xml; charset=utf-8"

# HTTP outbound client — in-process retry behaviour.
# Each Kafka consumer route defines its own retry/DLQ topic via @Value injection
# (e.g. kafka.topic.rcdc-retry → kraken-rcdc-retry-events).
# SOAP Server faults (detected in body on HTTP 200) are mapped to status 500
# before this list is evaluated, so they are automatically retried.
http:
  client:
    retry:
      max-attempts: 3
      initial-delay-ms: 1000
      backoff-multiplier: 2.0
      max-delay-ms: 30000
      retryable-status-codes: [404, 408, 429, 500, 502, 503, 504]

ftp:
  listener:
    enabled: false   # set true to re-enable the Profile Reads FTP poller

camel:
  springboot:
    name: KrakenCISContext
    stream-caching-enabled: true
    # Spool exchange bodies > 100 MB to disk instead of keeping them in heap.
    # Prevents OOM when large CSV files are buffered between Camel processors.
    stream-caching-spool-enabled: true
    stream-caching-spool-directory: ${java.io.tmpdir}/camel-spool
    stream-caching-spool-threshold: 104857600   # 100 MB
  main:
    auto-startup: true
  # Camel Observation (camel-observation-starter) auto-instruments routes/processors via
  # the Micrometer Observation API — no extra config needed. It shares trace context with
  # Spring's HTTP instrumentation so all spans nest into one connected trace.
  # Global Kafka security defaults — applied to ALL Camel Kafka endpoints
  # (both producer toD() and every consumer route URI).
  # Must be under camel.component.kafka.configuration.* — not directly under
  # camel.component.kafka.* — so Camel propagates them to every endpoint's
  # KafkaConfiguration, including all consumer clients.
  component:
    kafka:
      configuration:
        security-protocol: ${kafka.producer.security-protocol:PLAINTEXT}
        sasl-mechanism: ${kafka.producer.sasl-mechanism:}
        sasl-jaas-config: ${kafka.producer.sasl-jaas-config:}
        # saslClientCallbackHandlerClass is not a Camel KafkaConfiguration property —
        # must use additionalProperties with the native Kafka property name.
        # additional-properties:
        #   '[sasl.client.callback.handler.class]': ${kafka.producer.sasl-client-callback-handler-class:}

management:
  # Distributed tracing (Spring Boot 3.x / Micrometer Tracing with OTel bridge).
  # Injects traceId + spanId into MDC on every log line.
  # Propagates W3C traceparent header on all instrumented outbound HTTP calls.
  tracing:
    sampling:
      probability: 1.0     # 100% in dev/test — reduce to 0.1 in prod
  # Pin service.name on every span (else it defaults to spring.application.name).
  opentelemetry:
    resource-attributes:
      service.name: kraken-cis
      service.namespace: 
      # deployment.environment: ${ENVIRONMENT:dev}
  # OTLP exporter → OTel Collector (HTTP/protobuf receiver on port 4318).
  # Defaults to the in-cluster collector (the same one Kong exports to). Reachable
  # only from inside the cluster; for local dev set OTEL_EXPORTER_OTLP_ENDPOINT
  # to your local collector, e.g. http://localhost:4318.
  otlp:
    tracing:
      endpoint: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
      # endpoint: http://localhost:4318/v1/traces
      # endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector.observability.svc.cluster.local:4318}/v1/traces

  endpoints:
    web:
      exposure:
        include: health,info,camelroutes,camelstats,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        descriptions: true
        step: 60s

# ─────────────────────────────────────────────────────────────────────────────
# OpenTelemetry Integration — Native OpenTelemetry SDK tracing.
# ADDITIVE: coexists with the Micrometer-bridge auto-instrumentation configured
# under management.tracing / management.otlp above. This block configures ONLY the
# custom stage spans (RECEIVED / VALIDATED / KAFKA_PUBLISH_* / EXTERNAL_SERVICE_CALL
# / RESPONSE_SENT) emitted by com.pge.krakencis.observability.
# Disable entirely with otel.tracing.enabled=false (existing tracing is unaffected).
# ─────────────────────────────────────────────────────────────────────────────
otel:
  tracing:
    enabled: ${OTEL_TRACING_ENABLED:true}
    service-name: ${OTEL_SERVICE_NAME:camel-rcd-service-dev-main}
    service-namespace: ${OTEL_SERVICE_NAMESPACE:pge}
    environment: ${ENVIRONMENT:dev}
    # Collector base endpoint ("/v1/traces" is appended automatically). Shares the
    # same env var as the Micrometer bridge so both export to the same collector.
    # endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
    # endpoint: http://localhost:4318
    endpoint: http://otel-collector.observability.svc.cluster.local:4318

logging:
  level:
    com.pge.krakencis: DEBUG
    org.apache.camel: INFO
    # Silence OTLP span-export connection errors when no collector is reachable
    # (e.g. local dev). Span creation / MDC tracing is unaffected.
    io.opentelemetry.exporter.internal: "off"
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/kraken-cis.log
