spring:
  application:
    name: kraken-cis-implementation
  profiles:
    active: dev
  config:
    import: optional:classpath:kafka.yml,optional:classpath:ftp.yml,optional:classpath:s3.yml

# Spring Boot embedded server (Actuator management endpoints only)
server:
  port: 8121

# Retry-queue consumer — delay between retry-queue attempts (back-off)
retry:
  queue:
    max-attempts: 3          # re-entries into retry queue before final DLQ
    poll-delay-ms: 300000    # 5 min — slow poll IS the back-off delay

# Kong JWT — Bearer token added to all outbound HTTP calls routed through Kong.
# Override kong.jwt.secret via environment variable KONG_JWT_SECRET in production.
kong:
  jwt:
    secret: Kraken@2026!ExternalConsumer#JWT_Kong$Secure92xLpZ
    issuer: jwt-issuer
    expiry: 2910000000

# Camel Undertow REST API (main application port)
rest:
  host: 0.0.0.0
  port: 8122

# External service endpoints — all outbound target URLs configured here.
# Override per environment in config/{env}/application-{env}.yml
external-services:
  services:
    rcdc:
      url: http://192.168.4.34:9000/rcdcrequest
      timeout: 30000
      content-type: application/json
    rcdc-mdm-notification:
      url: http://192.168.4.34:9000/rcdcswitchstatus
      timeout: 30000
      content-type: "text/xml; charset=utf-8"
    odr-mock:
      url: http://192.168.4.34:9000/ondemandread
      timeout: 30000
      content-type: "text/xml; charset=utf-8"

# HTTP outbound client — in-process retry behaviour.
# Each Kafka consumer route defines its own retry/DLQ topic via @Value injection
# (e.g. kafka.topic.rcdc-retry → kraken-rcdc-retry-events).
# SOAP Server faults (detected in body on HTTP 200) are mapped to status 500
# before this list is evaluated, so they are automatically retried.
http:
  client:
    retry:
      max-attempts: 3
      initial-delay-ms: 1000
      backoff-multiplier: 2.0
      max-delay-ms: 30000
      retryable-status-codes: [404, 408, 429, 500, 502, 503, 504]

camel:
  springboot:
    name: KrakenCISContext
    stream-caching-enabled: true
    # Spool exchange bodies > 100 MB to disk instead of keeping them in heap.
    # Prevents OOM when large CSV files are buffered between Camel processors.
    stream-caching-spool-enabled: true
    stream-caching-spool-directory: ${java.io.tmpdir}/camel-spool
    stream-caching-spool-threshold: 104857600   # 100 MB
  main:
    auto-startup: true

management:
  # Distributed tracing (Spring Boot 3.x / Micrometer Tracing with OTel bridge).
  # Injects traceId + spanId into MDC on every log line.
  # Propagates W3C traceparent header on all instrumented outbound HTTP calls.
  tracing:
    sampling:
      probability: 1.0     # 100% in dev/test — reduce to 0.1 in prod
  # To export spans to Zipkin add:  management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
  # To export to Jaeger/Tempo add:  management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,camelroutes,camelstats,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        descriptions: true
        step: 60s

logging:
  level:
    com.pge.krakencis: DEBUG
    org.apache.camel: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/kraken-cis.log
