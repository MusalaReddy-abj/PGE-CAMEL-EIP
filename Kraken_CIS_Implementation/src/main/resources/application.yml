spring:
  application:
    name: kraken-cis-implementation
  profiles:
    active: dev
  config:
    import: optional:classpath:kafka.yml,optional:classpath:ftp.yml,optional:classpath:s3.yml

# Spring Boot embedded server (Actuator management endpoints only)
server:
  port: 8121

# Kong JWT — Bearer token added to all outbound HTTP calls routed through Kong.
# Override kong.jwt.secret via environment variable KONG_JWT_SECRET in production.
kong:
  jwt:
    secret: Kraken@2026!ExternalConsumer#JWT_Kong$Secure92xLpZ
    issuer: jwt-issuer
    expiry: 2910000000

# Camel Undertow REST API (main application port)
rest:
  host: 0.0.0.0
  port: 8122

# External service endpoints — all outbound target URLs configured here.
# Override per environment in config/{env}/application-{env}.yml
external-services:
  services:
    rcdc:
      url: http://k8s-kong-kongprox-ab80982ddc-c2f4184cafe543b5.elb.ap-south-2.amazonaws.com/rcdcrequest
      timeout: 30000
      content-type: application/json
    rcdc-mdm-notification:
      url: http://k8s-kong-kongprox-ab80982ddc-c2f4184cafe543b5.elb.ap-south-2.amazonaws.com/rcdcswitchstatus
      timeout: 30000
      content-type: "text/xml; charset=utf-8"
    odr-mock:
      url: http://k8s-kong-kongprox-ab80982ddc-c2f4184cafe543b5.elb.ap-south-2.amazonaws.com/mockondemandread
      timeout: 30000
      content-type: "text/xml; charset=utf-8"

# HTTP outbound client — in-process retry behaviour.
# Each Kafka consumer route defines its own retry/DLQ topic via @Value injection
# (e.g. kafka.topic.rcdc-retry → kraken-rcdc-retry-events).
# SOAP Server faults (detected in body on HTTP 200) are mapped to status 500
# before this list is evaluated, so they are automatically retried.
http:
  client:
    retry:
      max-attempts: 2          # DEMO — REVERT to 3 before prod (1 = no HTTP-level retries)
      initial-delay-ms: 1000
      backoff-multiplier: 2.0
      max-delay-ms: 30000
      retryable-status-codes: [404, 408, 429, 500, 502, 503, 504]

# ODR API versioning.
#  · MAJOR version is in the URL: /api/v1/odr, /api/v2/odr. v2 toggle below.
#  · MINOR version is negotiated per-request via the X-API-Version header on v1
#    (NOT the URL — minors are backward-compatible). Enforced by OdrVersionProcessor:
#    absent → default; unknown → 400; below minimum → 400. 1.1 adds an additive field.
odr:
  v2:
    enabled: true
  version:
    supported: "1.0,1.1"   # supported MINOR versions of the v1 major
    minimum: "1.0"         # reject X-API-Version below this
    default: "1.1"         # used when the client sends no X-API-Version header

# Profile Reads S3 ingestion mode (cross-pod duplicate handling):
#  · work-queue (default) — ProfileReadsScheduler lists S3 and publishes one work-item per
#    file to a Kafka work topic; the consumer group hands each file to exactly ONE pod, so no
#    cross-pod duplicate processing while both pods stay busy. See ProfileReadsWorkConsumer.
#  · poller — original direct aws2-s3 polling (ProfileReadsS3Listner); both pods poll the same
#    bucket and can double-process. Use only for single-pod runs or fallback.
profile-reads:
  ingestion:
    mode: work-queue
  work:
    max-poll-records: 1    # process one file per poll; files can be large/heavy
    max-poll-interval-ms: 1800000  # allow up to 30 min to process a large file before Kafka rebalances

ftp:
  listener:
    enabled: false   # set true to re-enable the Profile Reads FTP poller

camel:
  springboot:
    name: KrakenCISContext
    stream-caching-enabled: true
    # Spool exchange bodies > 100 MB to disk instead of keeping them in heap.
    # Prevents OOM when large CSV files are buffered between Camel processors.
    stream-caching-spool-enabled: true
    stream-caching-spool-directory: ${java.io.tmpdir}/camel-spool
    stream-caching-spool-threshold: 104857600   # 100 MB
  main:
    auto-startup: true
  # OpenTelemetry Java Agent Migration — Native SDK removed / Instrumentation provided
  # by Java Agent. Camel routes/processors are now auto-instrumented by the OpenTelemetry
  # Java Agent (camel-observation-starter removed), so all spans nest into one connected trace.
  # Global Kafka security defaults — applied to ALL Camel Kafka endpoints
  # (both producer toD() and every consumer route URI).
  # Must be under camel.component.kafka.configuration.* — not directly under
  # camel.component.kafka.* — so Camel propagates them to every endpoint's
  # KafkaConfiguration, including all consumer clients.
  component:
    kafka:
      configuration:
        security-protocol: ${kafka.producer.security-protocol:PLAINTEXT}
        sasl-mechanism: ${kafka.producer.sasl-mechanism:}
        sasl-jaas-config: ${kafka.producer.sasl-jaas-config:}
        # saslClientCallbackHandlerClass is not a Camel KafkaConfiguration property —
        # must use additionalProperties with the native Kafka property name.
        # additional-properties:
        #   '[sasl.client.callback.handler.class]': ${kafka.producer.sasl-client-callback-handler-class:}

# OpenTelemetry Java Agent Migration
# Native SDK removed / Instrumentation provided by Java Agent.
# All distributed tracing — span creation, sampling, service.name, and OTLP export —
# is now configured on the OpenTelemetry Java Agent via -Dotel.* flags in the
# Dockerfile (service name PGE_IMP_DEV_MAIN, OTLP/gRPC → :4317). The former
# management.tracing / management.otlp / management.opentelemetry blocks (Micrometer
# Tracing bridge) and the otel.tracing.* block (Native SDK) have been removed.
management:
  endpoints:
    web:
      exposure:
        include: health,info,camelroutes,camelstats,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        descriptions: true
        step: 60s

# OpenTelemetry Java Agent Migration
# Native SDK removed / Instrumentation provided by Java Agent.
# The former otel.tracing.* block (Native OpenTelemetry SDK stage spans) has been
# removed. Service name, endpoint, protocol and sampling are now set on the Java
# Agent via -Dotel.* flags in the Dockerfile.

logging:
  level:
    com.pge.krakencis: DEBUG
    org.apache.camel: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/kraken-cis.log
