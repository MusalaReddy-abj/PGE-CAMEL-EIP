kafka:
  producer:
    brokers: b-3.integrationdemo.0smws8.c2.kafka.ap-south-2.amazonaws.com:9092,b-1.integrationdemo.0smws8.c2.kafka.ap-south-2.amazonaws.com:9092,b-2.integrationdemo.0smws8.c2.kafka.ap-south-2.amazonaws.com:9092
    acks: all
    retries: 3
    request-timeout-ms: 30000
    linger-ms: 5
    compression-type: lz4
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.apache.kafka.common.serialization.StringSerializer
    # With acks=all and retries>0, cap in-flight requests to 5 to prevent
    # out-of-order delivery across retries (effective idempotent delivery).
    max-in-flight-request: 5
    # ── AWS MSK IAM auth (port 9198 = SASL/IAM public endpoint) ──────────────
    # Port 9192=plaintext-public  9194=TLS-public  9196=SCRAM-public  9198=IAM-public
    security-protocol: PLAINTEXT
    #sasl-mechanism: AWS_MSK_IAM
    #sasl-jaas-config: "software.amazon.msk.auth.iam.IAMLoginModule required;"
    #sasl-client-callback-handler-class: software.amazon.msk.auth.iam.IAMClientCallbackHandler

  consumer:
    group-id: kraken-cis-group
    auto-offset-reset: earliest
    enable-auto-commit: false
    max-poll-records: 500
    session-timeout-ms: 30000
    # Number of consumer threads per route per pod (Camel 4.x: consumersCount URI param).
    # Increase to scale throughput vertically within a single JVM.
    # Rule: consumers-count × maxPollRecords <= partition count for safe parallelism.
    consumers-count: 2
    # Prevent session timeout when processing large batches (max-poll-records=500)
    max-poll-interval-ms: 300000
    heartbeat-interval-ms: 10000
    # Security is sourced from kafka.producer.* and applied via KafkaProducerConfig.buildSecurityQueryString()


  topic:
    alarms:             kraken-alarm-events
    rcdc:               kraken-rcdc-events
    rcdc-retry:         kraken-rcdc-retry-events
    rcdc-dlq:           kraken-rcdc-dlq-events
    rcdc-parking:       kraken-rcdc-parking-events
    rcdc-hes-response:  kraken-rcdc-hes-response-events
    rcdc-hes-retry:     kraken-rcdc-hes-retry-events
    rcdc-hes-dlq:       kraken-rcdc-hes-dlq-events
    rcdc-hes-parking:   kraken-rcdc-hes-parking-events
    profile-reads:         kraken-profile-reads-events
    profile-reads-dlq:     kraken-profile-reads-dlq-events
    profile-reads-parking: kraken-profile-reads-parking-events
    profile-reads-audit:   kraken-profile-reads-audit-events
    # Work-queue topic: one message per discovered S3 file ({bucket,key,fileName}),
    # keyed by fileName so duplicate work-items for a file land on one consumer.
    profile-reads-work:    kraken-profile-reads-work-events

# Retry-queue consumer — delay between retry-queue attempts (back-off)
retry:
  queue:
    max-attempts: 3          # re-entries into retry queue before final DLQ
    poll-delay-ms: 15000    # DEMO 15s — REVERT to 300000 (5 min) before prod

# Automatic DLQ replay (DlqReplayRoute) — OPT-IN, disabled by default.
# When enabled, transient-failure DLQ messages are periodically replayed back to
# their source topic (capped by max-replays); permanent errors and exhausted
# replays are moved to the *-parking topic for manual review. See DlqReplayRoute.
dlq:
  replay:
    enabled: true            # automatic replay ON
    interval-ms: 15000     # DEMO 15s — REVERT to 1800000 (30 min) before prod
    initial-delay-ms: 15000  # DEMO 15s first run — REVERT to 30000 before prod
    max-messages-per-run: 100
    max-replays: 3           # transient replays before parking
