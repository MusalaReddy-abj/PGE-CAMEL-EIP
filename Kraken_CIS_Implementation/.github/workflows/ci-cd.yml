name: Kraken CIS — CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  IMAGE_NAME: kraken-cis-implementation

jobs:
  # ── Job 1: Build & Test ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Compile
        run: mvn compile -q

      - name: Test + Coverage
        run: mvn test -Dargline="-Xmx512m"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Upload JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: target/site/jacoco/

      - name: Coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          title: Code Coverage Report

  # ── Job 2: Build Docker image ─────────────────────────────────────────────
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build JAR (skip tests — already run)
        run: mvn package -DskipTests -q

      - name: Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.sha_short }}

  # ── Job 3: Deploy to UAT ──────────────────────────────────────────────────
  deploy-uat:
    name: Deploy → UAT
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: uat
      url: http://kraken-cis-uat.pge.internal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl (UAT)
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_UAT }}

      - name: Update image tag in deployment
        run: |
          IMAGE=${{ secrets.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-docker.outputs.short-sha }}
          kubectl set image deployment/kraken-cis-implementation \
            kraken-cis=${IMAGE} \
            --namespace=uat

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/kraken-cis-implementation \
            --namespace=uat \
            --timeout=5m

      - name: Smoke test (health check)
        run: |
          UAT_HOST=$(kubectl get svc kraken-cis-service -n uat -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -f --retry 5 --retry-delay 10 http://${UAT_HOST}:9091/actuator/health

  # ── Job 4: Deploy to PROD (manual approval gate) ──────────────────────────
  deploy-prod:
    name: Deploy → PROD
    runs-on: ubuntu-latest
    needs: deploy-uat
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: prod                        # 'prod' environment requires manual approval in GitHub settings
      url: http://kraken-cis.pge.internal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl (PROD)
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PROD }}

      - name: Update image tag in deployment
        run: |
          IMAGE=${{ secrets.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-docker.outputs.short-sha }}
          kubectl set image deployment/kraken-cis-implementation \
            kraken-cis=${IMAGE} \
            --namespace=prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/kraken-cis-implementation \
            --namespace=prod \
            --timeout=5m

      - name: Smoke test (health check)
        run: |
          PROD_HOST=$(kubectl get svc kraken-cis-service -n prod -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -f --retry 5 --retry-delay 10 http://${PROD_HOST}:9091/actuator/health
