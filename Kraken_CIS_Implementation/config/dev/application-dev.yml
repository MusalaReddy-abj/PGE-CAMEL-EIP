spring:
  config:
    import: optional:file:config/dev/kafka.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/kraken_dev
    username: dev_user
    password: dev_pass

rest:
  host: 0.0.0.0
  port: 8080

external-services:
  services:
    rcdc:
      url: http://dev-rcdc-service:8082/api/rcdc/command
      timeout: 30000
      content-type: application/json
    rcdc-mdm-notification:
      url: http://dev-mdm-service:8083/ws/RCDSwitchState
      timeout: 30000
      content-type: "text/xml; charset=utf-8"

kraken:
  api:
    base-url: https://kraken-dev.company.com/api
    timeout: 30000

ftp:
  profile-reads:
    include: ".*\\.csv"

http:
  client:
    retry:
      max-attempts: 3
      initial-delay-ms: 1000
      backoff-multiplier: 2.0
      max-delay-ms: 30000
      retryable-status-codes: [429, 500, 502, 503, 504]
    dlq-topic: kraken-http-outbound-dlq
    retry-topic: kraken-http-outbound-retry
