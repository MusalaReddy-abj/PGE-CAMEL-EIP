spring:
  config:
    import: optional:file:config/uat/kafka.yml
  datasource:
    url: jdbc:postgresql://uat-db:5432/kraken_uat
    username: uat_user
    password: uat_pass

rest:
  host: 0.0.0.0
  port: 8080

external-services:
  services:
    rcdc:
      url: http://uat-rcdc-service:8082/api/rcdc/command
      timeout: 30000
      content-type: application/json

kraken:
  api:
    base-url: https://kraken-uat.company.com/api
    timeout: 30000

ftp:
  profile-reads:
    include: ".*\\.csv"
