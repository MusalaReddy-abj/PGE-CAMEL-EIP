spring:
  config:
    import: optional:file:config/test/kafka.yml
  datasource:
    url: jdbc:postgresql://test-db:5432/kraken_test
    username: test_user
    password: test_pass

rest:
  host: 0.0.0.0
  port: 8081

external-services:
  services:
    rcdc:
      url: http://test-rcdc-service:8082/api/rcdc/command
      timeout: 30000
      content-type: application/json

kraken:
  api:
    base-url: https://kraken-test.company.com/api
    timeout: 30000

ftp:
  profile-reads:
    include: ".*\\.csv"

http:
  client:
    retry:
      max-attempts: 2
      initial-delay-ms: 500
      backoff-multiplier: 2.0
      max-delay-ms: 5000
      retryable-status-codes: [429, 500, 502, 503, 504]
    dlq-topic: kraken-http-outbound-dlq
    retry-topic: kraken-http-outbound-retry
